<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Aula 09 - Formulários</title>
</head>

<body>

    <h2 style="background-color: rgb(0, 0, 0);"> <span style="color: rgb(255, 255, 255);">Formulário</span></h2>

    <form>
        <table border="1">

            <tr>
                <td>Nome:</td>
                <td><input type="text" placeholder="Digite seu nome"></td>
            </tr>

            <tr>
                <td>E-mail pessoal:</td>
                <td><input type="email"></td>
            </tr>

            <tr>
                <td>E-mail (pattern):</td>
                <td><input type="email" placeholder="Digite seu email com @" pattern=".+@.+"></td>
            </tr>

            <tr>
                <td>Senha:</td>
                <td><input type="password"></td>
            </tr>

            <tr>
                <td>Idade:</td>
                <td><input type="number" style="width:60px;"></td>
            </tr>

            <tr>
                <td colspan="2">
                    Deixe um comentário:<br>
                    <textarea></textarea>
                </td>
            </tr>

            <tr>
                <td>
                    Materia de interesse:<br>
                    <input type="checkbox"> Backend<br>
                    <input type="checkbox"> FrontEnd<br>
                    <input type="checkbox"> FullStack
                </td>

                <td>
                    Tipo de Viagem:<br>
                    <input type="radio" name="viagem"> Negócio<br>
                    <input type="radio" name="viagem"> Lazer<br>
                    <input type="radio" name="viagem"> Turismo<br>
                    <input type="radio" name="viagem"> Acadêmico
                </td>
            </tr>

            <tr>
                <td>
                    Esporte favorito:<br>
                    <select multiple size="4">
                        <option>Futebol</option>
                        <option>Basquete</option>
                        <option>Vôlei</option>
                        <option>Tênis</option>
                    </select>
                </td>

                <td>
                    Investimentos:
                    <select>
                        <optgroup label="Poupança">
                            <option>CDB</option>
                            <option>Tesouro Direto</option>
                        </optgroup>
                        <optgroup label="Fundos Imobiliários">
                            <option>CDI</option>
                            <option>DEBÊNTURES</option>
                        </optgroup>
                        <optgroup label="Criptomoedas">
                            <option>Ações</option>
                        </optgroup>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    Escolha uma cor:
                    <input type="color">
                </td>

                <td>
                    Selecione um arquivo:
                    <input type="file">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    Data e Hora envio:
                    <input type="datetime-local">
                </td>
            </tr>

            <tr>
                <td>
                    <button type="submit">Enviar</button>
                </td>
                <td>
                    <button type="reset">Limpar</button>
                </td>
            </tr>

        </table>
    </form>

</body>

</html>
